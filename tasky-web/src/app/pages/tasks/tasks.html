<div class="m-5 p-5 ">
  <div class="flex justify-between mb-5">
    <h1 class="text-2xl font-bold">Tasks</h1>
    <div>
      <input type="text" placeholder="Search" class="p-2 border rounded" (input)="search()" [(ngModel)]="searchTerm"/>
      <button mat-button (click)="search()" class="mx-2"><mat-icon>search</mat-icon></button>
      <button mat-button  matButton="filled" (click)="addTask()">
        <mat-icon>add</mat-icon>
        Add Task</button>
    </div>
  </div>


  <div>
    @for (task of filteredTasks; track task.id) {
    <div class="space-y-2">
      <mat-checkbox class="mt-2" [checked]="task.completed" (change)="toggleTask(task.id)">
        <div>
          <p class="font-bold">{{ task.title }}</p>
          <p class="text-gray-600">{{ task.description }}</p>
        </div>
      </mat-checkbox>
      <div>
        <div class="flex space-x-2">
          <button mat-button (click)="openDialog(taskDialog, task)">
            <mat-icon>edit</mat-icon>
            Edit</button>
          <button mat-button (click)="deleteTask(task.id)">
            <mat-icon>delete</mat-icon>
            Delete</button>
        </div>
      </div>
      <mat-divider></mat-divider>
    </div>
    }
  </div>

  <ng-template #taskDialog>
    <div class="p-5">
      <h2>Task</h2>
      <mat-dialog-content>
        <form  (ngSubmit)="addTask()">
          <mat-form-field class="w-full">
            <mat-label>Title</mat-label>
            <input matInput name="title" [(ngModel)]="task.title" required>
          </mat-form-field>
          <mat-form-field class="w-full">
            <mat-label>Description</mat-label>
            <textarea matInput  name="description" [(ngModel)]="task.description" required></textarea>
          </mat-form-field>
          <button mat-button type="submit">Update</button>
        </form>
      </mat-dialog-content>
    </div>
  </ng-template>
</div>
